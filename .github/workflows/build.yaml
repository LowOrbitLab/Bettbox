name: build

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  IS_STABLE: ${{ !contains(github.ref, '-') }}
  IS_PRERELEASE: ${{ contains(github.ref_name, 'pre') }}
  SHOULD_RELEASE: ${{ github.event_name == 'push' && (!contains(github.ref, '-') || contains(github.ref_name, 'pre')) }}
  GRADLE_OPTS: -Dorg.gradle.vfs.watch=false
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SENTRY_BACKEND: none
  SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
  
jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: android
            os: ubuntu-24.04
            arch: arm64
          - platform: android
            os: ubuntu-24.04
            arch: amd64
          - platform: android
            os: ubuntu-24.04
            arch: arm
          - platform: android
            os: ubuntu-24.04
            arch: universal
          - platform: windows
            os: windows-2022
            arch: amd64
          - platform: windows
            os: windows-11-arm
            arch: arm64
          - platform: windows
            os: windows-2022
            arch: amd64
            compatible: true
          - platform: macos
            os: macos-15
            arch: arm64
          - platform: macos
            os: macos-15
            arch: amd64
          - platform: macos
            os: macos-15
            arch: amd64
            compatible: true
          - platform: linux
            os: ubuntu-22.04
            arch: amd64
          - platform: linux
            os: ubuntu-24.04-arm
            arch: arm64
          - platform: linux
            os: ubuntu-22.04
            arch: amd64
            compatible: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Setup Rust (Windows)
        if: matrix.platform == 'windows'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.arch == 'arm64' && 'aarch64-pc-windows-msvc' || 'x86_64-pc-windows-msvc' }}

      - name: Enable Git long paths (Windows)
        if: matrix.platform == 'windows'
        run: git config --global core.longpaths true

      - name: Setup Keystore (Android)
        if: matrix.platform == 'android'
        run: |
          echo "${{ secrets.KEYSTORE }}" | base64 --decode > android/app/keystore.jks
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/local.properties
          echo "storePassword=${{ secrets.STORE_PASSWORD }}" >> android/local.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/local.properties
          
      - name: Setup Java (Android)
        if: matrix.platform == 'android'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: 'gradle'

      - name: Install Dependencies (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update -o Acquire::Retries=3 -o Acquire::ForceIPv4=true
          sudo apt-get install -y -o Acquire::Retries=3 -o Acquire::ForceIPv4=true --fix-missing libcurl4-openssl-dev ninja-build libgtk-3-dev rpm

      - name: Setup Golang
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.compatible == true && '1.20.x' || '1.24.x' }}
          cache-dependency-path: core/go.sum

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ contains(matrix.os, 'arm') && 'master' || 'stable' }}
          cache: true
          cache-key: flutter-${{ matrix.platform }}-${{ matrix.arch }}-${{ hashFiles('**/pubspec.lock') }}
          flutter-version: ${{ contains(matrix.os, 'arm') && '' || '3.44.6' }}


      - name: Clean Gradle (Android)
        if: matrix.platform == 'android'
        run: |
          cd android
          flutter clean

      - name: Patch for Windows
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          cd core
          SING_TUN_VERSION=$(grep -E 'github\.com/metacubex/sing-tun\s+v[^[:space:]]+' go.mod | awk '{print $2}')
          echo "Detected sing-tun version: ${SING_TUN_VERSION}"
          go mod download github.com/metacubex/sing-tun@${SING_TUN_VERSION}
          MOD_CACHE=$(go env GOMODCACHE | tr '\\' '/')
          FILE="${MOD_CACHE}/github.com/metacubex/sing-tun@${SING_TUN_VERSION}/tun_windows.go"
          echo "Patching ${FILE}"
          chmod +w "${FILE}"
          perl -pi -e 's/inetIf\.ForwardingEnabled = true/inetIf.ForwardingEnabled = false/g' "${FILE}"

      - name: Build Bettbox (Non-Windows)
        if: matrix.platform != 'windows'
        shell: bash
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          flutter pub get
          dart run build_runner build -d
          dart setup.dart ${{ matrix.platform }} --arch ${{ matrix.arch }} ${{ env.IS_STABLE == 'true' && '--env stable' || '' }} ${{ matrix.compatible == true && '--compatible' || '' }}

      - name: Install SignPath (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        env:
          SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
        run: |
          if (-not $env:SIGNPATH_API_TOKEN) {
            Write-Host "SIGNPATH_API_TOKEN is not configured. Skipping module installation."
            exit 0
          }
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          Set-PSRepository -Name 'PSGallery' -InstallationPolicy Trusted
          Install-Module -Name SignPath -Force -Scope CurrentUser -Repository PSGallery

      - name: Set Signing Policy Slug (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $slug = "test-signing"
          Write-Host "Setting SIGNING_POLICY_SLUG to $slug"
          "SIGNING_POLICY_SLUG=$slug" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build Core (Windows)
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          flutter pub get
          dart run build_runner build -d
          dart setup.dart windows --arch ${{ matrix.arch }} --out core-only ${{ matrix.compatible == true && '--compatible' || '' }}

      - name: Upload Unsigned Core
        if: matrix.platform == 'windows' && env.SIGNPATH_API_TOKEN != ''
        id: upload-core
        uses: actions/upload-artifact@v7
        with:
          name: unsigned-core-${{ matrix.arch }}-${{ matrix.compatible }}
          path: libclash/windows/BettboxCore.exe
          if-no-files-found: error
          retention-days: 1

      - name: Sign Core (Windows)
        if: matrix.platform == 'windows' && env.SIGNPATH_API_TOKEN != ''
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: '${{ env.SIGNPATH_API_TOKEN }}'
          github-token: '${{ secrets.GITHUB_TOKEN }}'
          organization-id: '0d3f8e8e-3f4d-4ac8-ab3f-d6c5c110ab0d'
          project-slug: 'Bettbox'
          signing-policy-slug: '${{ env.SIGNING_POLICY_SLUG }}'
          github-artifact-id: '${{ steps.upload-core.outputs.artifact-id }}'
          wait-for-completion: true
          output-artifact-directory: 'libclash/windows'

      - name: Build HelperService (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $signedCoreHash = (Get-FileHash libclash/windows/BettboxCore.exe -Algorithm SHA256).Hash.ToLower()
          Write-Host "Signed Core SHA256 (TOKEN for Helper): $signedCoreHash"
          dart setup.dart windows --arch ${{ matrix.arch }} --out helper --core-hash $signedCoreHash ${{ matrix.compatible == true && '--compatible' || '' }}

      - name: Upload Unsigned HelperService
        if: matrix.platform == 'windows' && env.SIGNPATH_API_TOKEN != ''
        id: upload-helper
        uses: actions/upload-artifact@v7
        with:
          name: unsigned-helper-${{ matrix.arch }}-${{ matrix.compatible }}
          path: libclash/windows/BettboxHelperService.exe
          if-no-files-found: error
          retention-days: 1

      - name: Sign HelperService (Windows)
        if: matrix.platform == 'windows' && env.SIGNPATH_API_TOKEN != ''
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: '${{ env.SIGNPATH_API_TOKEN }}'
          github-token: '${{ secrets.GITHUB_TOKEN }}'
          organization-id: '0d3f8e8e-3f4d-4ac8-ab3f-d6c5c110ab0d'
          project-slug: 'Bettbox'
          signing-policy-slug: '${{ env.SIGNING_POLICY_SLUG }}'
          github-artifact-id: '${{ steps.upload-helper.outputs.artifact-id }}'
          wait-for-completion: true
          output-artifact-directory: 'libclash/windows'

      - name: Build Bettbox (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          $coreHash = (Get-FileHash libclash/windows/BettboxCore.exe -Algorithm SHA256).Hash.ToLower()
          Write-Host "Core SHA256: $coreHash"
          
          $desc = if ('${{ matrix.compatible }}' -eq 'true') { "${{ matrix.arch }}-compatible" } else { "${{ matrix.arch }}" }
          $appEnv = if ('${{ env.IS_STABLE }}' -eq 'true') { "stable" } else { "pre" }
          
          $flutterArgs = @(
            "build", "windows", "--release", "--verbose",
            "--dart-define=CORE_SHA256=$coreHash",
            "--dart-define=APP_ENV=$appEnv",
            "--dart-define=APP_ASSET_SUFFIX=windows-$desc-setup.exe"
          )
          if ($env:SENTRY_DSN) {
            $flutterArgs += "--dart-define=SENTRY_DSN=$env:SENTRY_DSN"
          }
          
          flutter @flutterArgs

      - name: Upload Unsigned Bettbox
        if: matrix.platform == 'windows' && env.SIGNPATH_API_TOKEN != ''
        id: upload-bettbox
        uses: actions/upload-artifact@v7
        with:
          name: unsigned-bettbox-${{ matrix.arch }}-${{ matrix.compatible }}
          path: build/windows/${{ matrix.arch == 'arm64' && 'arm64' || 'x64' }}/runner/Release/Bettbox.exe
          if-no-files-found: error
          retention-days: 1

      - name: Sign Bettbox (Windows)
        if: matrix.platform == 'windows' && env.SIGNPATH_API_TOKEN != ''
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: '${{ env.SIGNPATH_API_TOKEN }}'
          github-token: '${{ secrets.GITHUB_TOKEN }}'
          organization-id: '0d3f8e8e-3f4d-4ac8-ab3f-d6c5c110ab0d'
          project-slug: 'Bettbox'
          signing-policy-slug: '${{ env.SIGNING_POLICY_SLUG }}'
          github-artifact-id: '${{ steps.upload-bettbox.outputs.artifact-id }}'
          wait-for-completion: true
          output-artifact-directory: 'build/windows/${{ matrix.arch == ''arm64'' && ''arm64'' || ''x64'' }}/runner/Release'

      - name: Package Windows Application
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          dart windows/packaging/exe/package_windows.dart --arch ${{ matrix.arch }} ${{ matrix.compatible == true && '--compatible' || '' }} --env ${{ env.IS_STABLE == 'true' && 'stable' || 'pre' }}

      - name: Find Installer Path
        if: matrix.platform == 'windows' && env.SIGNPATH_API_TOKEN != ''
        shell: pwsh
        run: |
          $desc = if ('${{ matrix.compatible }}' -eq 'true') { "${{ matrix.arch }}-compatible" } else { "${{ matrix.arch }}" }
          $installer = (Resolve-Path "dist/Bettbox-*-windows-$desc-setup.exe").Path
          echo "INSTALLER_PATH=$installer" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "INSTALLER_FILENAME=$(Split-Path -Leaf $installer)" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload Unsigned Installer
        if: matrix.platform == 'windows' && env.SIGNPATH_API_TOKEN != ''
        id: upload-installer
        uses: actions/upload-artifact@v7
        with:
          name: unsigned-installer-${{ matrix.arch }}-${{ matrix.compatible }}
          path: ${{ env.INSTALLER_PATH }}
          if-no-files-found: error
          retention-days: 1

      - name: Sign Installer (Windows)
        if: matrix.platform == 'windows' && env.SIGNPATH_API_TOKEN != ''
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: '${{ env.SIGNPATH_API_TOKEN }}'
          github-token: '${{ secrets.GITHUB_TOKEN }}'
          organization-id: '0d3f8e8e-3f4d-4ac8-ab3f-d6c5c110ab0d'
          project-slug: 'Bettbox'
          signing-policy-slug: '${{ env.SIGNING_POLICY_SLUG }}'
          github-artifact-id: '${{ steps.upload-installer.outputs.artifact-id }}'
          wait-for-completion: true
          output-artifact-directory: 'dist'
      
      - name: Clean up intermediate unsigned artifacts
        if: always() && matrix.platform == 'windows' && env.SIGNPATH_API_TOKEN != ''
        uses: geekyeggo/delete-artifact@v6
        with:
          name: |
            unsigned-core-${{ matrix.arch }}-${{ matrix.compatible }}
            unsigned-helper-${{ matrix.arch }}-${{ matrix.compatible }}
            unsigned-bettbox-${{ matrix.arch }}-${{ matrix.compatible }}
            unsigned-installer-${{ matrix.arch }}-${{ matrix.compatible }}
          failOnError: false
      
      - name: Verify Core Permissions (Linux)
        if: matrix.platform == 'linux' && matrix.compatible != true
        shell: bash
        run: |
          echo "=== Verifying BettboxCore setuid in DEB package ==="
          if ls dist/Bettbox-*.deb 1>/dev/null 2>&1; then
            DEB_PERMS=$(dpkg-deb -c dist/Bettbox-*.deb | grep BettboxCore || true)
            echo "$DEB_PERMS"
            if echo "$DEB_PERMS" | grep -q 'rws'; then
              echo "OK: BettboxCore in DEB has setuid bit"
            else
              echo "WARNING: BettboxCore in DEB is missing setuid bit (will be set by postinst on install)"
              POSTINST=$(dpkg-deb -e dist/Bettbox-*.deb /tmp/bettbox-deb-control && cat /tmp/bettbox-deb-control/postinst || true)
              if ! echo "$POSTINST" | grep -q '/usr/share/Bettbox/BettboxCore'; then
                echo "ERROR: postinst script does not set permissions on /usr/share/Bettbox/BettboxCore"
                exit 1
              fi
            fi
          fi
          echo "=== Verifying BettboxCore setuid in RPM package ==="
          if ls dist/Bettbox-*.rpm 1>/dev/null 2>&1; then
            RPM_PERMS=$(rpm -qplv dist/Bettbox-*.rpm | grep BettboxCore || true)
            echo "$RPM_PERMS"
            if ! echo "$RPM_PERMS" | grep -q 'rws'; then
              echo "ERROR: BettboxCore in RPM is missing setuid bit"
              exit 1
            fi
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: Bettbox-${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.compatible == true && '-compatible' || '' }}
          path: ./dist
          compression-level: 9
          overwrite: true

  upload:
    permissions: write-all
    needs: [ build ]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download
        uses: actions/download-artifact@v8
        with:
          path: ./dist/
          pattern: Bettbox-*
          merge-multiple: true

      - name: Generate release.md
        run: |
          echo -e "- Fixes and improvements\n- 具体变更参考最新Commits" > release.md

      - name: Patch release.md
        run: |
          version=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          base_version=$(echo "$version" | sed 's/-pre[0-9]*//')
          if [ "${{ env.IS_PRERELEASE }}" == "true" ]; then
            sed -e "s|BASE_VERSION|$base_version|g" -e "s|VERSION|$version|g" ./.github/release_template_pre.md >> release.md
          else
            sed -e "s|BASE_VERSION|$base_version|g" -e "s|VERSION|$version|g" ./.github/release_template.md >> release.md
          fi

      - name: Release
        if: ${{ env.SHOULD_RELEASE == 'true' }}
        uses: softprops/action-gh-release@v3.0.0
        with:
          files: ./dist/*
          body_path: './release.md'
          prerelease: ${{ env.IS_PRERELEASE == 'true' }}
